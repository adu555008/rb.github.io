<script>
	// 开庄统计
	let obj = {
		z: 0,
		x: 0,
		p: 0
	}
	// 所有开庄
	let resArr = [];
	// 路
	let luArr = [];
	
	let resBox = document.getElementById('resBox');
	let luBox = document.getElementById('luBox');
	
	function push(zxp) {
		// 添加开庄结果
		resArr.push(zxp);
		// 添加统计开庄结果
		if (zxp === 1) {
			obj.z++;
		} else if (zxp === 2) {
			obj.x++;
		} else if (zxp === 3) {
			obj.p++;
		}
		// 添加路
		if (luArr.length === 0) {
			luArr.push([zxp]);
		} else {
			let luLen = luArr.length - 1;
			let luLast = luArr[luLen][luArr[luLen].length - 1];
			if (luLast === zxp) {
				luArr[luLen].push(zxp);
			} else {
				luArr.push([zxp]);
			}
		}
		console.log(resArr);
		console.log(luArr);
		resBox.innerHTML = resArr.join(',');
		luBox.innerHTML = luArr.join(',');
	}
